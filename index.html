<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إهداء إلى جود ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@1&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: radial-gradient(circle at center, #4b134f 0%, #1a0b2e 100%);
            font-family: 'Tajawal', Arial, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        #start-btn {
            padding: 15px 50px;
            font-size: 1.5em;
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 75, 43, 0.4);
            transition: all 0.3s ease;
            z-index: 100;
            animation: bounce 2s infinite;
        }

        #start-btn:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 15px 25px rgba(255, 75, 43, 0.6);
        }

        #content {
            display: none;
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 800px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 5em;
            margin: 0;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 65, 108, 0.8), 0 0 40px rgba(255, 65, 108, 0.4);
            animation: pulse 3s infinite;
        }

        .en-name {
            font-size: 3.5em;
            font-family: 'Brush Script MT', cursive;
            color: #ffb8d2;
            margin-top: 5px;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 184, 210, 0.6);
        }

        /* تنسيق العبارات المتتالية */
        .phrases-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .phrase {
            font-family: 'Amiri', serif;
            font-size: 1.8em;
            font-style: italic;
            color: #fce4ec;
            opacity: 0;
            transform: translateY(30px);
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* تفعيل الأنيميشن للعبارات عند إعطاء الكلاس active للمحتوى */
        #content.active .phrase:nth-child(1) { animation: fadeInUp 1.5s forwards 1s; }
        #content.active .phrase:nth-child(2) { animation: fadeInUp 1.5s forwards 3s; }
        #content.active .phrase:nth-child(3) { animation: fadeInUp 1.5s forwards 5s; }
        #content.active .phrase:nth-child(4) { animation: fadeInUp 1.5s forwards 7s; }
        #content.active .phrase:nth-child(5) { animation: fadeInUp 1.5s forwards 9s; }

        .designer-signature {
            margin-top: 50px;
            font-size: 1.1em;
            font-family: 'Tajawal', sans-serif;
            color: #ffb8d2;
            opacity: 0;
            border-top: 1px solid rgba(255, 184, 210, 0.3);
            padding-top: 15px;
            display: inline-block;
        }

        #content.active .designer-signature {
            animation: fadeIn 2s forwards 11s;
        }

        /* تنسيق العناصر المتساقطة */
        .falling-item {
            position: absolute;
            top: -10%;
            user-select: none;
            pointer-events: none;
            animation-name: fall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            z-index: 1;
        }

        /* الحركات (Animations) */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); text-shadow: 0 0 30px rgba(255, 65, 108, 1); }
            100% { transform: scale(1); }
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 0.8; }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* زر الطوارئ لتشغيل الصوت */
        #audio-fallback {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 65, 108, 0.9);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.2em;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            animation: pulse 2s infinite;
        }

        /* استجابة للشاشات الصغيرة */
        @media (max-width: 600px) {
            h1 { font-size: 4em; }
            .en-name { font-size: 2.5em; }
            .phrase { font-size: 1.4em; }
            #audio-fallback { bottom: 15px; right: 15px; font-size: 1em; padding: 10px 20px; }
        }
    </style>
</head>
<body>

    <button id="start-btn">اضغطي هنا للدخول ❤️</button>

    <div id="content">
        <h1>جود</h1>
        <div class="en-name">Joud</div>
        
        <div class="phrases-container">
            <div class="phrase">أنتِ النور الذي يضيء تفاصيل أيامي ✨</div>
            <div class="phrase">وكل ثانية معكِ هي عُمر من السعادة 💖</div>
            <div class="phrase">في عينيكِ أرى كل جمال هذا العالم 🌹</div>
            <div class="phrase">أنتِ أجمل صدفة زيّنت حياتي 💕</div>
            <div class="phrase">أحبكِ اليوم، وغداً، وإلى الأبد ❤️</div>
        </div>

        <div class="designer-signature">تصميم: حمزة</div>
    </div>

    <button id="audio-fallback">🔊 اضغطي هنا لتشغيل الموسيقى</button>

    <audio id="bg-music" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const startBtn = document.getElementById('start-btn');
        const content = document.getElementById('content');
        const bgMusic = document.getElementById('bg-music');
        const audioFallbackBtn = document.getElementById('audio-fallback');

        startBtn.addEventListener('click', function() {
            // 1. إخفاء الزر الرئيسي
            startBtn.style.display = 'none';
            
            // 2. إظهار المحتوى
            content.style.display = 'block';
            setTimeout(() => {
                content.classList.add('active');
            }, 100);

            // 3. بدء تساقط العناصر
            createFallingItems();

            // 4. المحاولة الذكية لتشغيل الصوت
            // استخدام Promise للتحقق مما إذا كان المتصفح سيسمح بالتشغيل أو سيرفض
            const playPromise = bgMusic.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    // التشغيل نجح، لا حاجة لعمل شيء إضافي
                    console.log("تم تشغيل الصوت بنجاح");
                }).catch(error => {
                    // التشغيل فشل بسبب سياسة المتصفح!
                    console.log("المتصفح منع التشغيل التلقائي، سيتم إظهار زر طلب التشغيل", error);
                    
                    // إظهار زر الطوارئ لتطلب من المستخدم تشغيل الصوت بنفسه
                    audioFallbackBtn.style.display = 'block';
                });
            }
        });

        // حدث عند الضغط على زر الطوارئ
        audioFallbackBtn.addEventListener('click', function() {
            bgMusic.play();
            // إخفاء الزر بعد نجاح التشغيل
            audioFallbackBtn.style.display = 'none';
        });

        function createFallingItems() {
            const items = ['❤️', '💖', '✨', '🌹', '💕'];
            
            setInterval(() => {
                const item = document.createElement('div');
                item.classList.add('falling-item');
                item.innerText = items[Math.floor(Math.random() * items.length)];
                item.style.left = Math.random() * 100 + 'vw';
                item.style.animationDuration = Math.random() * 3 + 4 + 's';
                item.style.fontSize = Math.random() * 1.5 + 1 + 'em';
                document.body.appendChild(item);

                setTimeout(() => {
                    item.remove();
                }, 7000);
            }, 500);
        }
    </script>

</body>
</html>
